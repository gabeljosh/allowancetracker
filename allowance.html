<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<title>Allowance Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.8.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg-primary:#ffffff;
    --bg-secondary:#f9f9f9;
    --bg-danger:#fef2f2;
    --bg-warning:#fffbeb;
    --text-primary:#111111;
    --text-secondary:#555555;
    --text-tertiary:#999999;
    --text-danger:#b91c1c;
    --text-warning:#92400e;
    --border:rgba(0,0,0,0.10);
    --border-med:rgba(0,0,0,0.20);
    --border-warning:rgba(180,130,0,0.3);
    --radius-md:8px;--radius-lg:12px;
    --green:#1D9E75;--red:#E24B4A;--amber:#EF9F27;
    --garnet:#73000A;--garnet-light:#fdf0f1;--garnet-mid:#9a0010;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg-primary:#ffffff;
    --bg-secondary:#f9f9f9;
    --bg-danger:#fef2f2;
    --bg-warning:#fffbeb;
    --text-primary:#111111;
    --text-secondary:#555555;
    --text-tertiary:#999999;
    --text-danger:#b91c1c;
    --text-warning:#92400e;
    --border:rgba(0,0,0,0.10);
    --border-med:rgba(0,0,0,0.20);
    --border-warning:rgba(180,130,0,0.3);
    --garnet-light:#fdf0f1;--garnet-mid:#9a0010;
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#ffffff;color:var(--text-primary);min-height:100vh}
  #app{max-width:600px;margin:0 auto;padding:1rem}

  .auth-bar{display:flex;align-items:center;justify-content:space-between;background:var(--garnet);border:none;border-radius:var(--radius-lg);padding:.75rem 1.25rem;margin-bottom:1rem}
  .auth-bar-left{display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(255,255,255,0.75)}
  .auth-badge{display:flex;align-items:center;gap:5px;font-size:13px;font-weight:500;color:#ffffff}
  .auth-badge i{color:rgba(255,255,255,0.8)}
  .auth-btn{font-size:12px;padding:5px 12px;border-radius:var(--radius-md);border:1px solid rgba(255,255,255,0.4);background:transparent;cursor:pointer;color:rgba(255,255,255,0.85);font-family:inherit}
  .auth-btn:active{opacity:.7}
  .auth-btn.unlock{color:#ffffff;border-color:rgba(255,255,255,0.7);font-weight:500}

  .pin-modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:300;padding:1rem}
  .pin-modal{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:2rem 1.5rem;width:100%;max-width:280px;text-align:center}
  .pin-title{font-size:17px;font-weight:500;margin-bottom:6px}
  .pin-sub{font-size:13px;color:var(--text-secondary);margin-bottom:1.5rem}
  .pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:1.5rem}
  .pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border-med);transition:background .15s,border-color .15s}
  .pin-dot.filled{background:var(--garnet);border-color:var(--garnet)}
  .pin-dot.error{border-color:var(--red)}
  .pin-error{font-size:13px;color:var(--red);margin-bottom:1rem;min-height:20px}
  .pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
  .pin-key{padding:16px;border-radius:var(--radius-md);border:0.5px solid var(--border);background:var(--bg-secondary);font-size:20px;font-weight:400;cursor:pointer;color:var(--text-primary);font-family:inherit}
  .pin-key:active{background:var(--border-med)}
  .pin-key.del{font-size:16px;color:var(--text-secondary)}
  .pin-cancel{font-size:13px;color:var(--text-tertiary);background:transparent;border:none;cursor:pointer;padding:8px;font-family:inherit}

  .dashboard{background:var(--bg-primary);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;border:0.5px solid var(--border)}
  .dash-date{font-size:13px;color:var(--text-secondary);margin-bottom:10px;display:flex;align-items:baseline;gap:6px}
  .dash-day{font-size:22px;font-weight:500;color:var(--text-primary)}
  .dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .dash-kid{background:var(--bg-secondary);border:0.5px solid var(--border);border-radius:var(--radius-md);padding:8px 6px;text-align:center;cursor:pointer;transition:border-color .15s}
  .dash-kid:active{opacity:.75}
  .dash-kid.active{border:2px solid var(--garnet)}
  .dash-name{font-size:10px;color:var(--text-tertiary);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
  .dash-kid.active .dash-name{color:var(--garnet)}
  .dash-bal{font-size:16px;font-weight:500}
  .pos{color:var(--green)}.neg{color:var(--red)}

  .month-end{border:0.5px solid var(--border-warning);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;background:var(--bg-warning)}
  .month-end-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-warning);font-weight:500;margin-bottom:10px}
  .month-end-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-size:13px;border-top:0.5px solid var(--border-warning)}
  .month-end-row:first-of-type{border-top:none}
  .month-end-name{font-weight:500}
  .payout{color:var(--green);font-weight:500}.carry-fwd{color:var(--red);font-weight:500}

  .top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
  .top-bar-left{display:flex;align-items:center;gap:6px}
  .kid-name{font-size:15px;font-weight:500}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--garnet);flex-shrink:0}
  .sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .icon-btn{font-size:13px;color:var(--garnet);background:transparent;border:0.5px solid var(--garnet);cursor:pointer;padding:6px 12px;border-radius:var(--radius-md);display:flex;align-items:center;gap:5px;font-family:inherit;font-weight:500}
  .icon-btn:active{opacity:.7}

  .balance-card{background:var(--bg-primary);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;border:0.5px solid var(--border);border-left:3px solid var(--garnet);flex-wrap:wrap;gap:12px}
  .balance-label{font-size:13px;color:var(--text-secondary);margin-bottom:4px}
  .balance-amount{font-size:32px;font-weight:500}
  .balance-sub{font-size:11px;color:var(--text-tertiary);margin-top:3px}

  .actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
  .action-card{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem}
  .section-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--garnet);margin-bottom:10px;font-weight:600}
  .action-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:9px 10px;margin-bottom:6px;border-radius:var(--radius-md);border:0.5px solid var(--border);background:transparent;cursor:pointer;font-size:13px;text-align:left;color:var(--text-primary);font-family:inherit}
  .action-btn:last-child{margin-bottom:0}
  .action-btn:active{background:var(--bg-secondary)}
  .action-btn:disabled{opacity:.4;cursor:not-allowed}
  .action-note{font-size:11px;color:var(--text-tertiary);margin-top:2px}
  .earn-amt{color:var(--green);font-weight:500;font-size:13px;flex-shrink:0}
  .lose-amt{color:var(--red);font-weight:500;font-size:13px;flex-shrink:0}
  .locked-notice{text-align:center;padding:.75rem;font-size:13px;color:var(--text-tertiary);background:var(--bg-secondary);border-radius:var(--radius-md);margin-bottom:1rem}
  .chore-list{margin-bottom:1rem}
  .chore-list-card{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
  .chore-list-header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.25rem;cursor:pointer;user-select:none}
  .chore-list-header:active{background:var(--bg-secondary)}
  .chore-list-body{padding:0 1.25rem 1rem}
  .chore-group-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--garnet);font-weight:600;margin:12px 0 6px}
  .chore-row{display:flex;align-items:flex-start;justify-content:space-between;padding:7px 0;border-top:0.5px solid var(--border);gap:10px}
  .chore-row:first-of-type{border-top:none}
  .chore-row-name{font-size:13px;color:var(--text-primary)}
  .chore-row-note{font-size:11px;color:var(--text-tertiary);margin-top:2px}
  .chore-row-amt{font-size:13px;font-weight:500;white-space:nowrap;flex-shrink:0}

  .log-section{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem}
  .log-empty{font-size:13px;color:var(--text-tertiary);text-align:center;padding:1.5rem 0}
  .log-item{padding:10px 0;border-top:0.5px solid var(--border)}
  .log-item:first-child{border-top:none;padding-top:0}
  .log-item.carry-item{background:var(--bg-danger);margin:0 -1.25rem;padding:10px 1.25rem}
  .log-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .log-desc{font-size:13px;font-weight:500}
  .log-meta{font-size:11px;color:var(--text-tertiary);margin-top:2px}
  .log-by{display:inline-block;font-size:10px;background:var(--garnet-light);border:0.5px solid var(--border);border-radius:4px;padding:1px 5px;color:var(--garnet);margin-left:4px;vertical-align:middle;font-weight:500}
  .log-bal{font-size:11px;color:var(--text-tertiary);margin-top:3px}
  .log-note{font-size:12px;color:var(--text-secondary);margin-top:5px;padding:5px 8px;background:var(--bg-secondary);border-radius:var(--radius-md);border-left:2px solid var(--border-med)}
  .log-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
  .delta-pos{color:var(--green);font-size:13px;font-weight:500;white-space:nowrap}
  .delta-neg{color:var(--red);font-size:13px;font-weight:500;white-space:nowrap}
  .undo-btn{font-size:11px;color:var(--text-tertiary);background:transparent;border:none;cursor:pointer;padding:0;text-decoration:underline;font-family:inherit}

  .collapsible{background:var(--bg-primary);border:0.5px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;overflow:hidden}
  .collapsible-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;cursor:pointer;user-select:none}
  .collapsible-header:active{background:var(--bg-secondary)}
  .collapsible-loading{text-align:center;padding:1.5rem;font-size:13px;color:var(--text-tertiary)}
  .collapsible-locked{text-align:center;padding:1.25rem;font-size:13px;color:var(--text-tertiary);border-top:0.5px solid var(--border)}
  .history-table-wrap{overflow-x:auto;padding:0 1.25rem 1.25rem}
  table.hist{width:100%;border-collapse:collapse;font-size:13px;min-width:360px}
  table.hist th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text-tertiary);font-weight:500;text-align:right;padding:6px 8px;border-bottom:0.5px solid var(--border)}
  table.hist th:first-child{text-align:left}
  table.hist td{padding:8px 8px;border-top:0.5px solid var(--border);vertical-align:top;text-align:right}
  table.hist td:first-child{text-align:left;color:var(--text-secondary);font-size:12px;white-space:nowrap}
  table.hist tr.cur td{background:var(--bg-secondary)}
  table.hist tr.cur td:first-child{font-weight:500;color:var(--text-primary)}
  .h-bal{font-weight:500}.h-net{font-size:11px;color:var(--text-tertiary);margin-top:1px}
  .h-net.pos{color:var(--green)}.h-net.neg{color:var(--red)}

  .auth-log-wrap{padding:0 1.25rem 1.25rem}
  .auth-log-item{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 0;border-top:0.5px solid var(--border);gap:12px}
  .auth-log-item:first-child{border-top:none}
  .auth-log-left{display:flex;align-items:center;gap:8px}
  .auth-event-icon{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px}
  .icon-unlock{background:var(--garnet-light);color:var(--garnet)}
  .icon-lock{background:var(--bg-secondary);color:var(--text-tertiary)}
  .icon-fail{background:#fef2f2;color:var(--red)}
  .auth-log-name{font-size:13px;font-weight:500}
  .auth-log-event{font-size:11px;color:var(--text-tertiary);margin-top:1px}
  .auth-log-event.fail{color:var(--red)}
  .auth-log-time{font-size:11px;color:var(--text-tertiary);text-align:right;white-space:nowrap;flex-shrink:0}

  .error-box{background:var(--bg-danger);color:var(--text-danger);border-radius:var(--radius-md);padding:10px 14px;font-size:13px;margin-bottom:1rem}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:1rem}
  .modal{background:var(--bg-primary);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:1.5rem;width:100%;max-width:320px}
  .modal-title{font-size:16px;font-weight:500;margin-bottom:4px}
  .modal-amount{font-size:13px;font-weight:500;margin-bottom:14px}
  .modal-body{font-size:13px;color:var(--text-secondary);margin-bottom:14px;line-height:1.6}
  .modal label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:5px}
  .modal input[type=text],.modal textarea{width:100%;padding:10px 12px;border-radius:var(--radius-md);border:0.5px solid var(--border-med);background:var(--bg-secondary);color:var(--text-primary);font-size:14px;font-family:inherit;margin-bottom:14px;outline:none}
  .modal textarea{resize:vertical;min-height:80px}
  .modal input[type=text]:focus,.modal textarea:focus{border-color:var(--text-secondary)}
  .modal-btns{display:flex;gap:8px;justify-content:flex-end}
  .modal-btns button{padding:9px 18px;border-radius:var(--radius-md);border:0.5px solid var(--border-med);cursor:pointer;font-size:14px;background:transparent;color:var(--text-primary);font-family:inherit}
  .modal-btns button.primary{background:var(--garnet);color:#fff;border-color:transparent}
  .modal-btns button.danger{background:var(--red);color:#fff;border-color:transparent;opacity:.35;pointer-events:none;transition:opacity .15s}
  .modal-btns button.danger.ready{opacity:1;pointer-events:auto}
  .loading{text-align:center;padding:4rem 1rem;color:var(--text-tertiary);font-size:15px}
</style>
</head>
<body>
<div id="app"><div class="loading">Connecting…</div></div>
<script>
const SURL='https://plzihujpxuivhmpdjeck.supabase.co';
const SKEY='sb_publishable_z8V65CwMYRdjtJmVV4sd2A_sgocfB-l';
const CARRY_NAME='Deficit carried forward';

const USERS={
  '597b5e92aa8d424a475adb764ab15bb5c92c701991af987b1784e43478fa30d4':'Josh',
  '5cfd7297b12dad983f6f629c15f0e7b5a3eb78e24d38ba7a87ff7b1139bd9c44':'Jasmine'
};

const DEFAULT_BASE=10.00;

// Monthly base overrides — used for pro-rated or special months
// May 2026 is a ~10-day starter month; full base resumes June 2026
const MONTH_BASE_OVERRIDE={
  '2026-05':{
    'kid-michael':10.00,
    'kid-lincoln':5.00,
    'kid-jackson':5.00,
    'kid-harvey':5.00,
  }
};

const CHORES=[
  {id:'dishwasher', name:'Empty dishwasher',        note:'Dry dishes · in correct place · no mess on floor', amount:0.50},
  {id:'trash',      name:'Take out trash',           note:'Only when bag is full', amount:0.25},
  {id:'mealclean',  name:'Help cleaning after meal', note:'Stay for full cleanup or until dismissed by adult', amount:0.50},
  {id:'swiffer',    name:'Swiffer steps',            note:'', amount:0.25},
  {id:'baseboards', name:'Clean baseboards',         note:'Must use minimally damp rag · Per room', amount:0.50},
];

// Penalties that apply to all kids
const PENALTIES=[
  {id:'bedroom', name:'Messy bedroom check', note:'Random inspection', amount:-1.00},
  {id:'bedtime', name:'Missed bedtime',      note:'', amount:-2.00},
];

// Per-kid config: base amount, penalty overrides, and kid-specific extra penalties
const KID_CONFIG={
  'kid-michael':{
    base:20.00,
    penalties:{bedroom:-2.00, bedtime:-4.00},
    extraPenalties:[
      {id:'laundry', name:'Laundry not put away same day', note:'Must be put away day of', amount:-1.00}
    ]
  }
};

// Returns the correct base for a kid for a given month (handles overrides)
function kidBaseForMonth(id, month){
  const m=month||getMonth();
  return MONTH_BASE_OVERRIDE[m]?.[id] ?? KID_CONFIG[id]?.base ?? DEFAULT_BASE;
}
function kidBase(id){return kidBaseForMonth(id,getMonth())}
function kidPenalty(id,pid){return KID_CONFIG[id]?.penalties?.[pid]??PENALTIES.find(p=>p.id===pid)?.amount}
function kidExtraPenalties(id){return KID_CONFIG[id]?.extraPenalties||[]}

// Auth
let currentUser=null,pinBuffer='',pinError='',pinShake=false,showPinModal=false;

async function hashPin(pin){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function logAuthEvent(username,event){
  try{
    await db.from('auth_log').insert({id:uid(),username,event,ts:Date.now()});
    if(authLogOpen&&currentUser)await loadAuthLog(true);
  }catch(e){}
}
async function attemptPin(){
  const h=await hashPin(pinBuffer);
  if(USERS[h]){
    currentUser=USERS[h];pinBuffer='';pinError='';pinShake=false;showPinModal=false;
    await logAuthEvent(currentUser,'unlocked');render();
  } else {
    await logAuthEvent('unknown','failed attempt');
    pinError='Incorrect PIN';pinShake=true;pinBuffer='';render();
    setTimeout(()=>{pinShake=false;pinError='';render()},1500);
  }
}
function signOut(){if(currentUser)logAuthEvent(currentUser,'locked');currentUser=null;authLogOpen=false;authLogs=[];render()}
function openPin(){showPinModal=true;pinBuffer='';pinError='';pinShake=false;render()}
function cancelPin(){showPinModal=false;pinBuffer='';pinError='';pinShake=false;render()}
function pinKey(k){if(pinBuffer.length>=6)return;pinBuffer+=k;render();if(pinBuffer.length===6)setTimeout(attemptPin,120)}
function pinDel(){if(pinBuffer.length>0){pinBuffer=pinBuffer.slice(0,-1);render()}}

// Date / month helpers
function getMonth(){const n=new Date();return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`}
function getPrevMonth(){const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`}
function monthStart(m){const[y,mo]=m.split('-');return new Date(+y,+mo-1,1).getTime()}
function monthLabel(m){const[y,mo]=m.split('-');return new Date(+y,+mo-1,1).toLocaleString('default',{month:'long',year:'numeric'})}
function monthLabelShort(m){const[y,mo]=m.split('-');return new Date(+y,+mo-1,1).toLocaleString('default',{month:'short',year:'numeric'})}
function fmtTime(ts){const d=new Date(ts);return d.toLocaleDateString('default',{month:'short',day:'numeric',year:'numeric'})+' · '+d.toLocaleTimeString('default',{hour:'numeric',minute:'2-digit'})}
function fmtFull(ts){const d=new Date(ts);return d.toLocaleDateString('default',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('default',{hour:'numeric',minute:'2-digit',second:'2-digit'})}
function uid(){return 'e-'+Date.now()+'-'+Math.random().toString(36).slice(2,7)}
function isLastDay(){const d=new Date(),t=new Date(d);t.setDate(d.getDate()+1);return t.getMonth()!==d.getMonth()}
function daysLeftInMonth(){const n=new Date();const last=new Date(n.getFullYear(),n.getMonth()+1,0).getDate();return last-n.getDate()}
function dayLabel(){
  const n=new Date(),day=n.getDate();
  const v=day%100,sfx=['th','st','nd','rd'];
  const s=sfx[(v-20)%10]||sfx[v]||sfx[0];
  return{day:`${day}${s}`,context:n.toLocaleString('default',{weekday:'long',month:'long'})};
}

const db=window.supabase.createClient(SURL,SKEY);
let entries=[],allEntries=null,authLogs=[],loading=true,syncing=false,dbError=null;
let activeKid=localStorage.getItem('allowance-active')||'kid-michael';
let modalMode=null,pendingEntry=null;
let carryChecked=false,historyOpen=false,historyLoading=false,authLogOpen=false,authLogLoading=false,choresOpen=false;

function kidEntries(kidId,month){const m=month||getMonth();return entries.filter(e=>e.kid_id===kidId&&e.month===m).sort((a,b)=>a.ts-b.ts)}
function balance(kidId,month){const m=month||getMonth();return kidBaseForMonth(kidId,m)+kidEntries(kidId,m).reduce((s,e)=>s+e.delta,0)}
function runningBals(kidId){
  const log=kidEntries(kidId);const b=[];let r=kidBaseForMonth(kidId,getMonth());
  for(const e of log){r+=e.delta;b.push(r)}return b;
}
function histMonths(){if(!allEntries)return[];const ms=new Set(allEntries.map(e=>e.month));ms.add(getMonth());return[...ms].sort((a,b)=>b.localeCompare(a))}
function histBalance(kidId,month){
  if(!allEntries)return kidBaseForMonth(kidId,month);
  return kidBaseForMonth(kidId,month)+allEntries.filter(e=>e.kid_id===kidId&&e.month===month).reduce((s,e)=>s+e.delta,0);
}

async function loadEntries(){
  const m=getMonth(),prev=getPrevMonth();
  const{data,error}=await db.from('entries').select('*').in('month',[m,prev]).order('ts',{ascending:true});
  if(error){dbError=error.message;loading=false;render();return}
  entries=data.map(r=>({...r,delta:parseFloat(r.delta)}));
  if(!carryChecked){carryChecked=true;const ins=await applyCarryForwards();if(ins){const{data:d2}=await db.from('entries').select('*').in('month',[m,prev]).order('ts',{ascending:true});if(d2)entries=d2.map(r=>({...r,delta:parseFloat(r.delta)}))}}
  loading=false;dbError=null;
  if(historyOpen)await loadAllEntries(true);else render();
}
async function loadAllEntries(skipRender){
  historyLoading=true;if(!skipRender)render();
  const{data,error}=await db.from('entries').select('*').order('month',{ascending:false}).order('ts',{ascending:true});
  if(!error&&data)allEntries=data.map(r=>({...r,delta:parseFloat(r.delta)}));
  historyLoading=false;render();
}
async function loadAuthLog(skipRender){
  authLogLoading=true;if(!skipRender)render();
  const{data,error}=await db.from('auth_log').select('*').order('ts',{ascending:false}).limit(150);
  if(!error&&data)authLogs=data;
  authLogLoading=false;render();
}
async function applyCarryForwards(){
  const m=getMonth(),prev=getPrevMonth();let inserted=false;
  for(const kid of KIDS){
    const hasCarry=entries.some(e=>e.kid_id===kid.id&&e.month===m&&e.name===CARRY_NAME);if(hasCarry)continue;
    const prevHas=entries.some(e=>e.kid_id===kid.id&&e.month===prev);
    const prevBal=kidBaseForMonth(kid.id,prev)+entries.filter(e=>e.kid_id===kid.id&&e.month===prev).reduce((s,e)=>s+e.delta,0);
    if(prevHas&&prevBal<0){const{error}=await db.from('entries').insert({id:uid(),kid_id:kid.id,month:m,name:CARRY_NAME,delta:Math.round(prevBal*100)/100,note:`${monthLabel(prev)} ended at $${prevBal.toFixed(2)}`,ts:monthStart(m),edited_by:'system'});if(!error)inserted=true;}
  }
  return inserted;
}
async function insertEntry(row){syncing=true;render();const{error}=await db.from('entries').insert(row);if(error)dbError=error.message;syncing=false;allEntries=null;await loadEntries()}
async function removeEntry(id){syncing=true;render();const{error}=await db.from('entries').delete().eq('id',id);if(error)dbError=error.message;syncing=false;allEntries=null;await loadEntries()}
async function clearMonth(){syncing=true;render();const{error}=await db.from('entries').delete().eq('month',getMonth());if(error)dbError=error.message;carryChecked=false;syncing=false;allEntries=null;await loadEntries()}

function toggleHistory(){historyOpen=!historyOpen;if(historyOpen&&allEntries===null)loadAllEntries();else render()}
function toggleAuthLog(){if(!currentUser){openPin();return}authLogOpen=!authLogOpen;if(authLogOpen&&!authLogs.length)loadAuthLog();else render()}
function toggleChores(){choresOpen=!choresOpen;render()}

const KIDS=[
  {id:'kid-michael',name:'Michael'},
  {id:'kid-lincoln',name:'Lincoln'},
  {id:'kid-jackson',name:'Jackson'},
  {id:'kid-harvey', name:'Harvey'},
];

function render(){
  const root=document.getElementById('app');
  if(loading){root.innerHTML='<div class="loading">Connecting…</div>';return}
  const m=getMonth(),kid=KIDS.find(k=>k.id===activeKid)||KIDS[0];
  const{day,context}=dayLabel();
  const unlocked=!!currentUser;
  let h='';

  // PIN modal
  if(showPinModal){
    h+=`<div class="pin-modal-bg" onclick="cancelPin()"><div class="pin-modal" onclick="event.stopPropagation()">
      <div class="pin-title">Enter PIN</div><div class="pin-sub">Unlock editing access</div>
      <div class="pin-dots">`;
    for(let i=0;i<6;i++)h+=`<div class="pin-dot${i<pinBuffer.length?' filled':''}${pinShake?' error':''}"></div>`;
    h+=`</div><div class="pin-error">${pinError}</div>
      <div class="pin-pad">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="pinKey('${n}')">${n}</button>`).join('')}
        <button class="pin-key del" onclick="pinDel()">⌫</button>
        <button class="pin-key" onclick="pinKey('0')">0</button>
        <div></div>
      </div>
      <button class="pin-cancel" onclick="cancelPin()">Cancel</button>
    </div></div>`;
  }

  // Auth bar
  h+=`<div class="auth-bar">`;
  if(unlocked){h+=`<div class="auth-badge"><i class="ti ti-lock-open"></i> ${currentUser}</div><button class="auth-btn" onclick="signOut()">Lock</button>`;}
  else{h+=`<div class="auth-bar-left"><i class="ti ti-lock" style="font-size:14px"></i> View only</div><button class="auth-btn unlock" onclick="openPin()">Unlock</button>`;}
  h+=`</div>`;

  // Dashboard
  h+=`<div class="dashboard">
    <div class="dash-date"><span class="dash-day">${day}</span><span>${context}</span></div>
    <div class="dash-grid">`;
  for(const k of KIDS){const bal=balance(k.id);h+=`<div class="dash-kid${k.id===kid.id?' active':''}" onclick="selectKid('${k.id}')"><div class="dash-name">${k.name}</div><div class="dash-bal ${bal>=0?'pos':'neg'}">$${bal.toFixed(2)}</div></div>`;}
  h+=`</div></div>`;

  // Month end
  if(isLastDay()){
    h+=`<div class="month-end"><div class="month-end-title">Month end · ${monthLabel(m)}</div>`;
    for(const k of KIDS){const bal=balance(k.id);h+=`<div class="month-end-row"><span class="month-end-name">${k.name}</span>${bal>=0?`<span class="payout">Payout $${bal.toFixed(2)}</span>`:`<span class="carry-fwd">Carries $${bal.toFixed(2)} to next month</span>`}</div>`;}
    h+=`</div>`;
  }

  // Top bar
  h+=`<div class="top-bar">
    <div class="top-bar-left"><span class="kid-name">${kid.name}</span><div class="sync-dot${syncing?' syncing':''}"></div></div>
    ${unlocked?`<button class="icon-btn" onclick="openReset()">↺ Reset month</button>`:''}
  </div>`;

  if(dbError)h+=`<div class="error-box">${dbError}</div>`;

  // Balance card
  const log=kidEntries(kid.id),bals=runningBals(kid.id),bal=balance(kid.id),base=kidBaseForMonth(kid.id,m);
  const fullBase=KID_CONFIG[kid.id]?.base??DEFAULT_BASE;
  const isProrated=base!==fullBase;
  const daysLeft=daysLeftInMonth();
  const daysLabel=daysLeft===0?'Last day of month':daysLeft===1?'1 day left':`${daysLeft} days left`;
  h+=`<div class="balance-card">
    <div><div class="balance-label">${kid.name}'s balance</div><div class="balance-amount ${bal>=0?'pos':'neg'}">$${bal.toFixed(2)}</div></div>
    <div style="text-align:right">
      <div style="font-size:13px;color:var(--text-secondary)">${monthLabel(m)}</div>
      <div class="balance-sub">${daysLabel}</div>
      <div class="balance-sub"style="margin-top:1px">Base: $${base.toFixed(2)}/mo${isProrated?' · pro-rated':''}</div>
    </div>
  </div>`;

  // Actions — only when unlocked
  if(unlocked){
    const extraP=kidExtraPenalties(kid.id);
    h+=`<div class="actions-grid"><div class="action-card"><div class="section-label">Earn</div>`;
    for(const c of CHORES)h+=`<button class="action-btn"${syncing?' disabled':''} onclick="openEntry('${c.id}','${c.name}',${c.amount})"><div><div>${c.name}</div>${c.note?`<div class="action-note">${c.note}</div>`:''}</div><span class="earn-amt">+$${c.amount.toFixed(2)}</span></button>`;
    h+=`</div><div class="action-card"><div class="section-label">Deductions</div>`;
    for(const p of PENALTIES){const amt=kidPenalty(kid.id,p.id);h+=`<button class="action-btn"${syncing?' disabled':''} onclick="openEntry('${p.id}','${p.name}',${amt})"><div><div>${p.name}</div>${p.note?`<div class="action-note">${p.note}</div>`:''}</div><span class="lose-amt">-$${Math.abs(amt).toFixed(2)}</span></button>`;}
    for(const p of extraP)h+=`<button class="action-btn"${syncing?' disabled':''} onclick="openEntry('${p.id}','${p.name}',${p.amount})"><div><div>${p.name}</div>${p.note?`<div class="action-note">${p.note}</div>`:''}</div><span class="lose-amt">-$${Math.abs(p.amount).toFixed(2)}</span></button>`;
    h+=`</div></div>`;
  } else {
    h+=`<div class="locked-notice"><i class="ti ti-lock" style="font-size:13px;vertical-align:-1px"></i> Unlock to log chores and deductions</div>`;

    // Chore & rules reference — visible while locked
    const extraP=kidExtraPenalties(kid.id);
    h+=`<div class="chore-list"><div class="chore-list-card">
      <div class="chore-list-header" onclick="toggleChores()">
        <div class="section-label" style="margin-bottom:0">Available chores &amp; rules</div>
        <span style="font-size:18px;color:var(--text-tertiary)">${choresOpen?'▲':'▼'}</span>
      </div>`;
    if(choresOpen){
      h+=`<div class="chore-list-body">
        <div class="chore-group-label">Earn</div>`;
      for(const c of CHORES){
        h+=`<div class="chore-row">
          <div><div class="chore-row-name">${c.name}</div>${c.note?`<div class="chore-row-note">${c.note}</div>`:''}</div>
          <span class="chore-row-amt pos">+$${c.amount.toFixed(2)}</span>
        </div>`;
      }
      h+=`<div class="chore-group-label">Deductions</div>`;
      for(const p of PENALTIES){
        const amt=kidPenalty(kid.id,p.id);
        h+=`<div class="chore-row">
          <div><div class="chore-row-name">${p.name}</div>${p.note?`<div class="chore-row-note">${p.note}</div>`:''}</div>
          <span class="chore-row-amt neg">-$${Math.abs(amt).toFixed(2)}</span>
        </div>`;
      }
      for(const p of extraP){
        h+=`<div class="chore-row">
          <div><div class="chore-row-name">${p.name}</div>${p.note?`<div class="chore-row-note">${p.note}</div>`:''}</div>
          <span class="chore-row-amt neg">-$${Math.abs(p.amount).toFixed(2)}</span>
        </div>`;
      }
      h+=`</div>`;
    }
    h+=`</div></div>`;
  }

  // Audit log
  h+=`<div class="log-section"><div class="section-label" style="margin-bottom:12px">Audit log</div>`;
  if(!log.length){h+=`<div class="log-empty">No activity this month yet.</div>`;}
  else{
    const rev=[...log].reverse(),rb=[...bals].reverse();
    for(let i=0;i<rev.length;i++){
      const e=rev[i],runBal=rb[i],prevBal=runBal-e.delta,isCarry=e.name===CARRY_NAME;
      const cls=e.delta>=0?'delta-pos':'delta-neg',sign=e.delta>=0?'+':'';
      const safeNote=e.note?e.note.replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';
      const byLabel=e.edited_by&&e.edited_by!=='system'?`<span class="log-by">${e.edited_by}</span>`:'';
      h+=`<div class="log-item${isCarry?' carry-item':''}"><div class="log-row">
        <div style="flex:1;min-width:0">
          <div class="log-desc">${e.name}</div>
          <div class="log-meta">${fmtTime(e.ts)}${byLabel}</div>
          <div class="log-bal">$${prevBal.toFixed(2)} → $${runBal.toFixed(2)}</div>
          ${safeNote?`<div class="log-note">${safeNote}</div>`:''}
        </div>
        <div class="log-right">
          <span class="${cls}">${sign}$${Math.abs(e.delta).toFixed(2)}</span>
          ${unlocked&&!isCarry?`<button class="undo-btn" onclick="undoEntry('${e.id}')">undo</button>`:''}
        </div>
      </div></div>`;
    }
  }
  h+=`</div>`;

  // Monthly history
  h+=`<div class="collapsible">
    <div class="collapsible-header" onclick="toggleHistory()">
      <div class="section-label" style="margin-bottom:0">Monthly history</div>
      <span style="font-size:18px;color:var(--text-tertiary)">${historyOpen?'▲':'▼'}</span>
    </div>`;
  if(historyOpen){
    if(historyLoading){h+=`<div class="collapsible-loading">Loading…</div>`;}
    else if(allEntries){
      const months=histMonths();
      if(!months.length){h+=`<div class="collapsible-loading">No history yet.</div>`;}
      else{
        h+=`<div class="history-table-wrap"><table class="hist"><thead><tr><th>Month</th>`;
        for(const k of KIDS)h+=`<th>${k.name}</th>`;
        h+=`</tr></thead><tbody>`;
        for(const mo of months){
          const isCur=mo===m;
          h+=`<tr${isCur?' class="cur"':''}><td>${monthLabelShort(mo)}${isCur?' <span style="font-size:10px;opacity:.6">(now)</span>':''}</td>`;
          for(const k of KIDS){
            const b=histBalance(k.id,mo);
            const bBase=kidBaseForMonth(k.id,mo);
            const net=b-bBase;
            h+=`<td><div class="h-bal ${b>=0?'pos':'neg'}">$${b.toFixed(2)}</div><div class="h-net ${net>=0?'pos':'neg'}">${net>=0?'+':''}${net.toFixed(2)}</div></td>`;
          }
          h+=`</tr>`;
        }
        h+=`</tbody></table></div>`;
      }
    }
  }
  h+=`</div>`;

  // Auth history
  h+=`<div class="collapsible">
    <div class="collapsible-header" onclick="toggleAuthLog()">
      <div class="section-label" style="margin-bottom:0">Auth history</div>
      <span style="font-size:18px;color:var(--text-tertiary)">${authLogOpen?'▲':'▼'}</span>
    </div>`;
  if(authLogOpen){
    if(!unlocked){h+=`<div class="collapsible-locked"><i class="ti ti-lock" style="font-size:13px;vertical-align:-1px"></i> Unlock to view auth history</div>`;}
    else if(authLogLoading){h+=`<div class="collapsible-loading">Loading…</div>`;}
    else if(!authLogs.length){h+=`<div class="collapsible-loading">No auth history yet.</div>`;}
    else{
      h+=`<div class="auth-log-wrap">`;
      for(const e of authLogs){
        const isUnlock=e.event==='unlocked',isFail=e.event==='failed attempt';
        h+=`<div class="auth-log-item">
          <div class="auth-log-left">
            <div class="auth-event-icon ${isUnlock?'icon-unlock':isFail?'icon-fail':'icon-lock'}">
              <i class="ti ${isUnlock?'ti-lock-open':isFail?'ti-alert-triangle':'ti-lock'}"></i>
            </div>
            <div>
              <div class="auth-log-name">${isFail?'Unknown':e.username}</div>
              <div class="auth-log-event${isFail?' fail':''}">${e.event}</div>
            </div>
          </div>
          <div class="auth-log-time">${fmtFull(e.ts)}</div>
        </div>`;
      }
      h+=`</div>`;
    }
  }
  h+=`</div>`;

  // Entry modal
  if(modalMode==='entry'&&pendingEntry){
    const amt=pendingEntry.delta,amtStr=amt>=0?`+$${amt.toFixed(2)}`:`-$${Math.abs(amt).toFixed(2)}`,amtColor=amt>=0?'var(--green)':'var(--red)';
    h+=`<div class="modal-bg" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${pendingEntry.name}</div>
      <div class="modal-amount" style="color:${amtColor}">${amtStr}</div>
      <label for="note-input">Note <span style="opacity:.5">(optional)</span></label>
      <textarea id="note-input" placeholder="e.g. Did a great job"></textarea>
      <div class="modal-btns"><button onclick="closeModal()">Cancel</button><button class="primary" onclick="confirmEntry()">Log it</button></div>
    </div></div>`;
  }

  // Reset modal
  if(modalMode==='reset'){
    h+=`<div class="modal-bg" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title" style="color:var(--red)">Reset all balances?</div>
      <div class="modal-body">This will clear ${monthLabel(m)} activity for <strong>${KIDS.map(k=>k.name).join(', ')}</strong>. Cannot be undone.</div>
      <label for="reset-input">Type <strong>reset month</strong> to confirm</label>
      <input type="text" id="reset-input" placeholder="reset month" autocomplete="off" spellcheck="false"/>
      <div class="modal-btns"><button onclick="closeModal()">Cancel</button><button id="reset-btn" class="danger" onclick="confirmReset()">Reset all</button></div>
    </div></div>`;
  }

  root.innerHTML=h;

  if(modalMode==='entry'){const ta=document.getElementById('note-input');if(ta){ta.focus();ta.onkeydown=e=>{if(e.key==='Enter'&&e.metaKey)confirmEntry()}}}
  if(modalMode==='reset'){
    const inp=document.getElementById('reset-input'),btn=document.getElementById('reset-btn');
    if(inp){inp.focus();inp.addEventListener('input',()=>btn.classList.toggle('ready',inp.value.toLowerCase()==='reset month'));inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&inp.value.toLowerCase()==='reset month')confirmReset()});}
  }
}

function selectKid(id){activeKid=id;localStorage.setItem('allowance-active',id);render()}
function openEntry(id,name,delta){if(!currentUser)return;modalMode='entry';pendingEntry={id,name,delta};render()}
function openReset(){if(!currentUser)return;modalMode='reset';render()}
function closeModal(e){if(e)e.stopPropagation();modalMode=null;pendingEntry=null;render()}
function confirmEntry(){
  if(!currentUser)return;
  const ta=document.getElementById('note-input'),note=ta?ta.value.trim():'';
  const kid=KIDS.find(k=>k.id===activeKid);if(!kid||!pendingEntry)return;
  const row={id:uid(),kid_id:kid.id,month:getMonth(),name:pendingEntry.name,delta:pendingEntry.delta,note,ts:Date.now(),edited_by:currentUser};
  modalMode=null;pendingEntry=null;insertEntry(row);
}
function undoEntry(id){if(!currentUser)return;removeEntry(id)}
function confirmReset(){
  if(!currentUser)return;
  const inp=document.getElementById('reset-input');if(!inp||inp.value.toLowerCase()!=='reset month')return;
  modalMode=null;clearMonth();
}

db.channel('entries-live').on('postgres_changes',{event:'*',schema:'public',table:'entries'},()=>{if(!syncing){allEntries=null;loadEntries()}}).subscribe();
db.channel('auth-live').on('postgres_changes',{event:'INSERT',schema:'public',table:'auth_log'},()=>{if(authLogOpen&&currentUser)loadAuthLog(true)}).subscribe();
loadEntries();
</script>
</body>
</html>
